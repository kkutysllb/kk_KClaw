<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 主亮蓝色渐变 -->
    <linearGradient id="blueMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <!-- 深蓝色渐变 -->
    <linearGradient id="blueDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0099CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004499;stop-opacity:1" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景光晕 -->
  <circle cx="32" cy="32" r="28" fill="url(#blueMain)" opacity="0.1" filter="url(#glow)"/>

  <!-- 权杖主体 -->
  <rect x="30" y="8" width="4" height="48" rx="2" fill="url(#blueMain)" filter="url(#shadow)"/>

  <!-- 左侧翅膀 - 多层设计 -->
  <path d="M30 16 C22 12, 12 12, 8 16 C12 14, 20 14, 28 18" fill="url(#blueMain)" opacity="0.95" filter="url(#shadow)"/>
  <path d="M30 20 C24 17, 16 17, 12 20 C16 18, 22 18, 28 22" fill="url(#blueDark)" opacity="0.9"/>
  <path d="M30 24 C26 22, 20 22, 16 24 C20 23, 24 23, 28 26" fill="url(#blueMain)" opacity="0.85"/>

  <!-- 右侧翅膀 - 多层设计 -->
  <path d="M34 16 C42 12, 52 12, 56 16 C52 14, 44 14, 36 18" fill="url(#blueMain)" opacity="0.95" filter="url(#shadow)"/>
  <path d="M34 20 C40 17, 48 17, 52 20 C48 18, 42 18, 36 22" fill="url(#blueDark)" opacity="0.9"/>
  <path d="M34 24 C38 22, 44 22, 48 24 C44 23, 40 23, 36 26" fill="url(#blueMain)" opacity="0.85"/>

  <!-- 左侧蛇 - 更精细的曲线 -->
  <path d="M32 46 C24 42, 22 36, 26 32 C22 34, 20 40, 26 44 C20 38, 24 28, 30 26 C26 30, 24 36, 30 40"
        fill="none" stroke="url(#blueMain)" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M32 46 C24 42, 22 36, 26 32 C22 34, 20 40, 26 44 C20 38, 24 28, 30 26 C26 30, 24 36, 30 40"
        fill="none" stroke="#E0F7FF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- 右侧蛇 - 更精细的曲线 -->
  <path d="M32 46 C40 42, 42 36, 38 32 C42 34, 44 40, 38 44 C44 38, 40 28, 34 26 C38 30, 40 36, 34 40"
        fill="none" stroke="url(#blueDark)" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M32 46 C40 42, 42 36, 38 32 C42 34, 44 40, 38 44 C44 38, 40 28, 34 26 C38 30, 40 36, 34 40"
        fill="none" stroke="#E0F7FF" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- 顶部宝珠 - 发光效果 -->
  <circle cx="32" cy="8" r="5" fill="url(#blueMain)" filter="url(#glow)"/>
  <circle cx="32" cy="8" r="4" fill="url(#blueDark)"/>
  <circle cx="30" cy="6" r="2" fill="#E0F7FF" opacity="0.8"/>

  <!-- 底部装饰 -->
  <ellipse cx="32" cy="56" rx="4" ry="2" fill="url(#blueDark)" opacity="0.8"/>

  <!-- 中心高光点 -->
  <circle cx="32" cy="32" r="1.5" fill="#FFF" opacity="0.9" filter="url(#glow)"/>
</svg>
