# ============================================================================
# KClaw Agent — 皮肤模板示例
# ============================================================================
#
# 将此文件复制到 ~/.kclaw/skins/<名称>.yaml 以创建自定义皮肤。
# 所有字段均为可选项 — 未填写的值将继承默认皮肤的设置。
# 激活方式：/skin <名称>  或在 config.yaml 中设置 display.skin: <名称>
#
# 完整的 Schema 参考请查看 kclaw_cli/skin_engine.py。
# ============================================================================

# 必填：唯一的皮肤名称（用于 /skin 命令和配置文件）
name: example
description: 一个自定义皮肤示例 — 复制并修改此模板

# ── 颜色 ──────────────────────────────────────────────────────────────────
# 用于 Rich 标记的十六进制颜色值。这些设置控制 CLI 的视觉配色方案。
colors:
  # 横幅面板（启动时的欢迎框）
  banner_border: "#CD7F32"        # 面板边框
  banner_title: "#FFD700"         # 面板标题文本
  banner_accent: "#FFBF00"        # 章节标题（Available Tools、Skills 等）
  banner_dim: "#B8860B"           # 暗淡/柔和文本（分隔符、模型信息）
  banner_text: "#FFF8DC"          # 正文文本（工具名、技能名）



  # UI 元素
  # 通用强调色
  ui_accent: "#FFBF00"            # 通用强调色
  ui_label: "#4dd0e1"             # 标签
  ui_ok: "#4caf50"                # 成功指示器
  ui_error: "#ef5350"             # 错误指示器
  ui_warn: "#ffa726"              # 警告指示器

  # 输入区域
  prompt: "#FFF8DC"               # 提示文本颜色
  input_rule: "#CD7F32"           # 输入区域周围的水平分隔线

  # 响应框
  response_border: "#FFD700"      # 响应框边框（ANSI 颜色）

  # 会话显示
  session_label: "#DAA520"        # 会话标签
  session_border: "#8B8682"       # 会话 ID 暗淡颜色

# ── 动画 spinner ─────────────────────────────────────────────────────────────
# 自定义 API 调用和工具执行期间显示的动画 spinner。
spinner:
  # API 响应等待期间显示的表情
  waiting_faces:
    - "(｡◕‿◕｡)"
    - "(◕‿◕✿)"
    - "٩(◕‿◕｡)۶"

  # 深思熟虑/推理期间显示的表情
  thinking_faces:
    - "(｡•́︿•̀｡)"
    - "(◔_◔)"
    - "(¬‿¬)"

  # 动画消息中使用的动词（例如，"正在思考您的请求..."）
  thinking_verbs:
    - "思考中"
    - "沉思中"
    - "酝酿中"
    - "斟酌中"

  # 可选：动画周围的表情装饰
  # 每项是一对 [左, 右]。完全不填写则无翅膀装饰。
  # wings:
  #   - ["⟪⚔", "⚔⟫"]
  #   - ["⟪▲", "▲⟫"]

# ── 品牌标识 ────────────────────────────────────────────────────────────────
# CLI 界面中使用的文本字符串。
branding:
  agent_name: "KClaw Agent"          # 横幅标题、关于显示
  welcome: "欢迎！输入您的消息或 /help 查看命令。"
  goodbye: "再见！⚕"              # 退出消息
  response_label: " ⚕ KClaw "       # 响应框标题标签
  prompt_symbol: "❯ "                 # 输入提示符号
  help_header: "(^_^)? 可用命令"  # /help 标题文本

# ── 工具输出 ─────────────────────────────────────────────────────────────
# Tool 输出行的前缀字符。
#   "╎" (轻三连破折号垂直)
#   "▏" (左八分之一块)
#   "│" (盒绘图轻垂直线)
#   "┃" (盒绘图重垂直线)
tool_prefix: "┊"
