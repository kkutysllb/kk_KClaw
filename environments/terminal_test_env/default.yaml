# 终端测试环境 -- 默认配置
#
# 简单的文件创建任务，用于验证完整 Atropos + kclaw 技术栈。
# 使用 Modal 终端后端和 OpenRouter (Claude) 进行推理。
# API 密钥从 ~/kclaw/.env 加载
#
# 用法:
#   run-api
#   python environments/terminal_test_env/terminal_test_env.py serve \
#       --config environments/terminal_test_env/default.yaml

env:
  enabled_toolsets: ["terminal", "file"]
  max_agent_turns: 10
  max_token_length: 2048
  group_size: 3
  total_steps: 3
  steps_per_eval: 3
  terminal_backend: "modal"
  tool_call_parser: "kclaw"
  tokenizer_name: "NousResearch/DeepKClaw-3-Llama-3-3B-Preview"
  ensure_scores_are_not_same: false
  use_wandb: false
  system_prompt: >
    You are a helpful assistant with access to a terminal and file tools.
    Complete the user's request by using the available tools.
    Be precise and follow instructions exactly.

openai:
  base_url: "https://openrouter.ai/api/v1"
  model_name: "anthropic/claude-opus-4.6"
  server_type: "openai"
  health_check: false
  # api_key 从 .env 中的 OPENROUTER_API_KEY 加载
