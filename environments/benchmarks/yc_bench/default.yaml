# YC-Bench 评估 -- 默认配置
#
# 长期 Agent 基准: Agent 在模拟 1-3 年的运行中扮演 AI 初创公司 CEO，
# 通过 yc-bench CLI 子命令交互。
#
# 需要: pip install "kclaw[yc-bench]"
#
# 用法:
#   python environments/benchmarks/yc_bench/yc_bench_env.py evaluate \
#       --config environments/benchmarks/yc_bench/default.yaml
#
#   # 覆盖模型:
#   python environments/benchmarks/yc_bench/yc_bench_env.py evaluate \
#       --config environments/benchmarks/yc_bench/default.yaml \
#       --openai.model_name anthropic/claude-opus-4-20250514

env:
  enabled_toolsets: ["terminal"]
  max_agent_turns: 200
  max_token_length: 32000
  agent_temperature: 0.0
  terminal_backend: "local"
  terminal_timeout: 60
  presets: ["fast_test", "medium", "hard"]
  seeds: [1, 2, 3]
  run_timeout: 3600          # 每次运行 60 分钟挂钟时间，超出自动计为失败
  survival_weight: 0.5       # 二进制生存在综合分数中的权重
  funds_weight: 0.5          # 归一化最终资金在综合分数中的权重
  db_dir: "/tmp/yc_bench_dbs"
  company_name: "BenchCo"
  start_date: "01/01/2025"   # MM/DD/YYYY（yc-bench 约定）
  tokenizer_name: "NousResearch/KClaw-3-Llama-3.1-8B"
  use_wandb: true
  wandb_name: "yc-bench"
  ensure_scores_are_not_same: false
  data_dir_to_save_evals: "environments/benchmarks/evals/yc-bench"

openai:
  base_url: "https://openrouter.ai/api/v1"
  model_name: "anthropic/claude-sonnet-4.6"
  server_type: "openai"
  health_check: false
  # api_key 从 .env 中的 OPENROUTER_API_KEY 加载
