# OpenThoughts-TBLite 评估 -- Docker 后端（本地计算）
#
# 在本地机器的 Docker 容器中运行任务。
# 与 Modal 相同的沙箱隔离但无云费用。适合开发/测试。
#
# 用法:
#   python environments/benchmarks/tblite/tblite_env.py evaluate \
#       --config environments/benchmarks/tblite/local.yaml
#
#   # 覆盖并发数:
#   python environments/benchmarks/tblite/tblite_env.py evaluate \
#       --config environments/benchmarks/tblite/local.yaml \
#       --env.eval_concurrency 4

env:
  enabled_toolsets: ["terminal", "file"]
  max_agent_turns: 60
  max_token_length: 32000
  agent_temperature: 0.8
  terminal_backend: "docker"
  terminal_timeout: 300
  tool_pool_size: 16
  dataset_name: "NousResearch/openthoughts-tblite"
  test_timeout: 600
  task_timeout: 1200
  eval_concurrency: 8          # 最多同时运行 8 个任务
  tokenizer_name: "NousResearch/KClaw-3-Llama-3.1-8B"
  use_wandb: false
  wandb_name: "openthoughts-tblite-local"
  ensure_scores_are_not_same: false
  data_dir_to_save_evals: "environments/benchmarks/evals/openthoughts-tblite-local"

openai:
  base_url: "https://openrouter.ai/api/v1"
  model_name: "anthropic/claude-sonnet-4"
  server_type: "openai"
  health_check: false
  # api_key 从 .env 中的 OPENROUTER_API_KEY 加载
