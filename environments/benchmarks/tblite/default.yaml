# OpenThoughts-TBLite 评估 -- 默认配置
#
# TBLite 基准的纯评估环境（100 个难度校准的终端任务，
# Terminal-Bench 2.0 的更快代理）。
# 使用 Modal 终端后端提供每个任务的云隔离沙箱，
# OpenRouter 进行推理。
#
# 用法:
#   python environments/benchmarks/tblite/tblite_env.py evaluate \
#       --config environments/benchmarks/tblite/default.yaml
#
#   # 覆盖模型:
#   python environments/benchmarks/tblite/tblite_env.py evaluate \
#       --config environments/benchmarks/tblite/default.yaml \
#       --openai.model_name anthropic/claude-sonnet-4

env:
  enabled_toolsets: ["terminal", "file"]
  max_agent_turns: 60
  max_token_length: 32000
  agent_temperature: 0.8
  terminal_backend: "modal"
  terminal_timeout: 300        # 每个命令 5 分钟（构建、pip install）
  tool_pool_size: 128          # 100 个并行任务的线程池
  dataset_name: "NousResearch/openthoughts-tblite"
  test_timeout: 600
  task_timeout: 1200           # 每个任务 20 分钟挂钟时间（TBLite 任务更快）
  tokenizer_name: "NousResearch/KClaw-3-Llama-3.1-8B"
  use_wandb: true
  wandb_name: "openthoughts-tblite"
  ensure_scores_are_not_same: false
  data_dir_to_save_evals: "environments/benchmarks/evals/openthoughts-tblite"

openai:
  base_url: "https://openrouter.ai/api/v1"
  model_name: "anthropic/claude-opus-4.6"
  server_type: "openai"
  health_check: false
  # api_key 从 .env 中的 OPENROUTER_API_KEY 加载
